name: Playwright CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Install k6
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg software-properties-common
          curl https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Run E2E tests
        id: e2e
        run: npx playwright test --project=chromium
        continue-on-error: true

      - name: Run API tests
        id: api
        run: npx playwright test --project=api-tests --trace on
        continue-on-error: true

      - name: Run Performance tests
        id: perf
        run: k6 run tests/performance/login.perf.ts --summary-export=log/performance-report.json
        continue-on-error: true

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: log/
          if-no-files-found: ignore
          retention-days: 14

      - name: Fail job if any suite failed
        if: always()
        run: |
          if [ "${{ steps.e2e.outcome }}" = "failure" ] || \
             [ "${{ steps.api.outcome }}" = "failure" ] || \
             [ "${{ steps.perf.outcome }}" = "failure" ]; then
            echo "One or more test suites failed."
            exit 1
          fi